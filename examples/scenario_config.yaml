# Scenario Test Configuration Example

mode_type: random_scenario

stopping_criteria_list:
  - criteria_type: step
    max_steps: 50

scenario_list:
  - scenario_name: "Create and Delete VM"
    scenario_precondition_list:
      - precondition_type: status
        precondition_data: ["available"]
        compare_result: true
    action_list:
      - action_id: "create_vm"
        action_name: "create_instance"
        action_public_client: "vm_client.VMClient"
        action_args:
          - name: "test-vm"
          - flavor_id: "small"
          - image_id: "ubuntu-20.04"
        action_pre_check_list:
          - check_info: ["checks.check_quota"]
            check_result: true
        action_post_check_list:
          - check_info: ["checks.check_vm_status", "_resolver_vm_id"]
            check_result: "running"

      - action_id: "delete_vm"
        action_name: "delete_instance"
        action_public_client: "vm_client.VMClient"
        action_args:
          - "_resolver_vm_id"
        action_precondition_list:
          - precondition_type: status
            precondition_data: ["running", "stopped"]
            compare_result: true

  - scenario_name: "VM Power Cycle"
    scenario_precondition_list:
      - precondition_type: data
        precondition_data:
          status: "running"
          active: true
        compare_result: true
    action_list:
      - action_id: "stop_vm"
        action_name: "stop_instance"
        action_public_client: "vm_client.VMClient"
        action_args:
          - "_resolver_vm_id"

      - action_id: "start_vm"
        action_name: "start_instance"
        action_public_client: "vm_client.VMClient"
        action_args:
          - "_resolver_vm_id"
